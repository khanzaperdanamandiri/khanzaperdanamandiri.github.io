<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      background:
      linear-gradient(rgba(15,76,129,0.88), rgba(15,76,129,0.88)),
      url('https://images.unsplash.com/photo-1541888946425-d81bb19240f5?q=80&w=1400&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      padding:20px;
    }

    .login-container{
      width:100%;
      max-width:1100px;
      display:grid;
      grid-template-columns:1fr 1fr;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(15px);
      border-radius:30px;
      overflow:hidden;
      box-shadow:0 15px 40px rgba(0,0,0,0.25);
    }

    .login-left{
      padding:60px;
      color:white;
      display:flex;
      flex-direction:column;
      justify-content:center;
      background:linear-gradient(rgba(15,76,129,0.7), rgba(15,76,129,0.7));
    }

    .login-left img{
      width:120px;
      margin-bottom:25px;
    }

    .login-left h1{
      font-size:42px;
      line-height:1.2;
      margin-bottom:20px;
    }

    .login-left p{
      font-size:16px;
      line-height:1.8;
      color:#dcecff;
    }

    .login-right{
      background:white;
      padding:60px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .login-right h2{
      color:#0f4c81;
      font-size:34px;
      margin-bottom:10px;
    }

    .login-right p{
      color:#666;
      margin-bottom:35px;
    }

    .input-group{
      margin-bottom:22px;
    }

    .input-group label{
      display:block;
      margin-bottom:10px;
      font-weight:600;
      color:#0f4c81;
    }

    .input-group input{
      width:100%;
      padding:16px;
      border-radius:14px;
      border:1px solid #d7d7d7;
      font-size:15px;
      transition:0.3s;
      background:#f7f9fc;
    }

    .input-group input:focus{
      border-color:#0f4c81;
      outline:none;
      background:white;
      box-shadow:0 0 0 4px rgba(15,76,129,0.1);
    }

    .login-btn{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,#0f4c81,#1f78d1);
      color:white;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      margin-top:10px;
      box-shadow:0 10px 20px rgba(15,76,129,0.2);
    }

    .login-btn:hover{
      transform:translateY(-3px);
    }

    .error{
      margin-top:18px;
      color:red;
      font-size:14px;
      text-align:center;
    }

    .copyright{
      margin-top:30px;
      text-align:center;
      font-size:13px;
      color:#999;
    }

    @media(max-width:900px){

      .login-container{
        grid-template-columns:1fr;
      }

      .login-left{
        display:none;
      }

      .login-right{
        padding:40px 30px;
      }

    }

  </style>
</head>
<body>

<div class="login-container">

<div class="login-left">

<img src="logo.png" alt="Logo">

<h1>
Sistem Dashboard
CV KHANZA PERDANA MANDIRI
</h1>

<p>
Sistem login internal perusahaan untuk pengelolaan laporan proyek,
pengadaan barang, progress pekerjaan, dan monitoring operasional perusahaan.
</p>

</div>

<div class="login-right">

<h2>Login Admin</h2>

<p>
Silakan masuk menggunakan akun administrator perusahaan.
</p>

<div class="input-group">
<label>Email</label>
<input type="email" id="email" placeholder="Masukkan email admin">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" placeholder="Masukkan password">
</div>

<button class="login-btn" onclick="login()">
Masuk Dashboard
</button>

<div class="error" id="error"></div>

<div class="copyright">
© 2026 CV KHANZA PERDANA MANDIRI
</div>

</div>

</div>

<script>

function login(){

const email = document.getElementById('email').value;
const password = document.getElementById('password').value;

if(email === 'khanzaperdanamandiri' && password === 'Nazneen22'){

localStorage.setItem('login','true');
window.location.href = 'dashboard.html';

}else{

document.getElementById('error').innerHTML = 'Email atau password salah';

}

}

</script>

</body>
</html>

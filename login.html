<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      background:
      linear-gradient(rgba(15,76,129,0.88), rgba(15,76,129,0.88)),
      url('https://images.unsplash.com/photo-1541888946425-d81bb19240f5?q=80&w=1400&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      padding:20px;
    }

    .login-container{
      width:100%;
      max-width:1100px;
      display:grid;
      grid-template-columns:1fr 1fr;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(15px);
      border-radius:30px;
      overflow:hidden;
      box-shadow:0 15px 40px rgba(0,0,0,0.25);
    }

    .login-left{
      padding:60px;
      color:white;
      display:flex;
      flex-direction:column;
      justify-content:center;
      background:linear-gradient(rgba(15,76,129,0.7), rgba(15,76,129,0.7));
    }

    .login-left img{
      width:120px;
      margin-bottom:25px;
    }

    .login-left h1{
      font-size:42px;
      line-height:1.2;
      margin-bottom:20px;
    }

    .login-left p{
      font-size:16px;
      line-height:1.8;
      color:#dcecff;
    }

</html>

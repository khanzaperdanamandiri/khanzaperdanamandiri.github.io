<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#f4f8fc;
}

.sidebar{
width:280px;
height:100vh;
position:fixed;
left:0;
top:0;
background:linear-gradient(180deg,#0f4c81,#1f78d1);
color:white;
padding:30px 20px;
overflow:auto;
}

.sidebar img{
width:90px;
display:block;
margin:auto;
margin-bottom:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:40px;
font-size:22px;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
margin-bottom:15px;
}

.sidebar ul li a{
text-decoration:none;
color:white;
</html>

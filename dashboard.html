<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        *{ margin:0; padding:0; box-sizing:border-box; }
        body{ font-family:'Poppins',sans-serif; background:#eef3f9; }
     .sidebar{ width:270px; height:100vh; position:fixed; left:0; top:0; background:linear-gradient(180deg,#0f4c81,#1f78d1); padding:30px 20px; color:white; overflow:auto; }
     .sidebar img{ width:90px; display:block; margin:auto; margin-bottom:20px; }
     .sidebar h2{ text-align:center; margin-bottom:40px; font-size:24px; }
     .sidebar ul{ list-style:none; }
     .sidebar ul li{ margin-bottom:15px; }
     .sidebar ul li a{ text-decoration:none; color:white; display:block; padding:14px 18px; border-radius:12px; transition:0.3s; font-weight:500; cursor:pointer; }
     .sidebar ul li a:hover,.sidebar ul li a.active{ background:rgba(255,255,255,0.15); }
     .main{ margin-left:270px; padding:35px; }
     .topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
     .topbar h1{ color:#0f4c81; font-size:30px; }
     .logout-btn{ background:#ff2e2e; color:white; border:none; padding:12px 20px; border-radius:10px; cursor:pointer; font-weight:600; }
     .card{ background:white; padding:30px; border-radius:20px; box-shadow:0 5px 20px rgba(0,0,0,0.08); margin-bottom:30px; }
     .card h2{ margin-bottom:20px; color:#0f4c81; }
     .btn-add{ background:#1f78d1; color:white; border:none; padding:12px 18px; border-radius:10px; cursor:pointer; font-weight:600; margin-bottom:20px; }
        table{ width:100%; border-collapse:collapse; }
        table th, table td{ border:1px solid #ddd; padding:12px; }
        table th{ background:#0f4c81; color:white; }
        table input{ width:100%; padding:10px; border:1px solid #ccc; border-radius:8px; }
     .aksi-wrap{ display:flex; flex-direction:column; gap:8px; }
     .btn-save{ background:#1f78d1; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; }
     .btn-delete{ background:red; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; }
     .btn-create{ background:green; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; }
     .hidden{ display:none; }
        @media(max-width:900px){.sidebar{ position:relative; width:100%; height:auto; }.main{ margin-left:0; padding:20px; } }
    </style>
</head>

<body>

<div class="sidebar">
    <img src="logo.png">
    <h2>Dashboard Admin</h2>
    <ul>
        <li><a class="active" onclick="showPage('invoicePage',this)">🧾 Invoice</a></li>
        <li><a onclick="showPage('penawaranPage',this)">💰 Penawaran Harga</a></li>
    </ul>
</div>

<div class="main">
    <div class="topbar">
        <h1>Dashboard Perusahaan</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div id="invoicePage">
        <div class="card">
            <h2>Data Invoice</h2>
            <button class="btn-add" onclick="tambahInvoice()">+ Tambah Invoice</button>
            <table>
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>No Invoice</th>
                        <th>Perusahaan</th>
                        <th>Pekerjaan</th>
                        <th>Nilai</th>
                        <th>Keterangan</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="invoiceBody"></tbody>
            </table>
        </div>
    </div>

    <div id="penawaranPage" class="hidden">
        <div class="card">
            <h2>Penawaran Harga</h2>
            <button class="btn-add" onclick="tambahPenawaran()">+ Tambah Penawaran</button>
            <table>
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>No Penawaran</th>
                        <th>Perusahaan</th>
                        <th>Pekerjaan</th>
                        <th>Nilai</th>
                        <th>Keterangan</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="penawaranBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyADV-EDV5k_C9wyxWX5mFFj4BVqOt5nmgs",
        authDomain: "khanza-dashboard.firebaseapp.com",
        projectId: "khanza-dashboard",
        storageBucket: "khanza-dashboard.firebasestorage.app",
        messagingSenderId: "1078817547940",
        appId: "1:1078817547940:web:218d66f38846596e862831",
        measurementId: "G-YH3MGMZGY4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const BASE_URL = 'https://khanzaperdanamandiri.github.io/';

    window.logout = function(){
        localStorage.removeItem('login');
        window.location.href='login.html';
    }

    if(localStorage.getItem('login')!== 'true'){
        window.location.href='login.html';
    }

    window.showPage = function(pageId,el){
        document.getElementById('invoicePage').classList.add('hidden');
        document.getElementById('penawaranPage').classList.add('hidden');
        document.getElementById(pageId).classList.remove('hidden');
        document.querySelectorAll('.sidebar a').forEach(a=>{ a.classList.remove('active'); });
        el.classList.add('active');
    }

    window.hapusBaris = function(button){
        button.closest('tr').remove();
    }

    async function loadExcelFile(fileName){
        const response = await fetch(`${BASE_URL}${fileName}?t=${Date.now()}`, {cache: 'no-store'});
        if (!response.ok) throw new Error(`File ${fileName} tidak ketemu`);
        
        const arrayBuffer = await response.arrayBuffer();
        const workbook = new ExcelJS.Workbook();
        await workbook.xlsx.load(arrayBuffer);
        
        if(workbook.worksheets.length === 0) throw new Error(`File ${fileName} rusak. Upload ulang.`);
        return workbook.worksheets[0];
    }

    window.tambahInvoice = function(){
        const tbody = document.getElementById('invoiceBody');
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><input type="date" class="tanggal"></td>
            <td><input type="text" class="noinvoice"></td>
            <td><input type="text" class="perusahaan"></td>
            <td><input type="text" class="pekerjaan"></td>
            <td><input type="number" class="nilai"></td>
            <td><input type="text" class="keterangan"></td>
            <td>
                <div class="aksi-wrap">
                    <button class="btn-save" onclick="simpanInvoice(this)">Simpan</button>
                    <button class="btn-create" onclick="buatInvoice(this)">Buat</button>
                    <button class="btn-delete" onclick="hapusBaris(this)">Hapus</button>
                </div>
            </td>
        `;
        tbody.appendChild(row);
    }

    window.simpanInvoice = async function(button){
        const row = button.closest('tr');
        const data = {
            tanggal: row.querySelector('.tanggal').value,
            noinvoice: row.querySelector('.noinvoice').value,
            perusahaan: row.querySelector('.perusahaan').value,
            pekerjaan: row.querySelector('.pekerjaan').value,
            nilai: row.querySelector('.nilai').value,
            keterangan: row.querySelector('.keterangan').value
        };
        await addDoc(collection(db,'invoice'),data);
        alert('Invoice berhasil disimpan');
        loadInvoice();
    }

    window.buatInvoice = async function(button){
        const row = button.closest('tr');
        const getValue = (cls, idx) => row.querySelector(cls)? row.querySelector(cls).value : row.children[idx].innerText;
        
        try {
            const worksheet = await loadExcelFile('invoice.xlsx');
            
            // INVOICE: J13=tanggal, J14=noinvoice, D15=perusahaan
            worksheet.getCell('J13').value = getValue('.tanggal', 0);
            worksheet.getCell('J14').value = getValue('.noinvoice', 1);
            worksheet.getCell('D15').value = getValue('.perusahaan', 2);

            const buffer = await worksheet.workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${getValue('.noinvoice', 1) || 'invoice'}.xlsx`;
            link.click();
            URL.revokeObjectURL(link.href);
        } catch (error) {
            console.error('ERROR INVOICE:', error);
            alert(`Gagal: ${error.message}`);
        }
    }

    async function loadInvoice(){
        const tbody = document.getElementById('invoiceBody');
        tbody.innerHTML='';
        const querySnapshot = await getDocs(collection(db,'invoice'));
        querySnapshot.forEach((docSnap)=>{
            const data = docSnap.data();
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${data.tanggal}</td>
                <td>${data.noinvoice}</td>
                <td>${data.perusahaan}</td>
                <td>${data.pekerjaan}</td>
                <td>${data.nilai}</td>
                <td>${data.keterangan}</td>
                <td>
                    <div class="aksi-wrap">
                        <button class="btn-create" onclick="buatInvoice(this)">Buat</button>
                        <button class="btn-delete" onclick="hapusInvoiceFirebase('${docSnap.id}')">Hapus</button>
                    </div>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    window.hapusInvoiceFirebase = async function(id){
        if(confirm('Hapus data invoice ini?')){
            await deleteDoc(doc(db,'invoice',id));
            loadInvoice();
        }
    }

    window.tambahPenawaran = function(){
        const tbody = document.getElementById('penawaranBody');
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><input type="date" class="tanggal"></td>
            <td><input type="text" class="nopenawaran"></td>
            <td><input type="text" class="perusahaan"></td>
            <td><input type="text" class="pekerjaan"></td>
            <td><input type="number" class="nilai"></td>
            <td><input type="text" class="keterangan"></td>
            <td>
                <div class="aksi-wrap">
                    <button class="btn-save" onclick="simpanPenawaran(this)">Simpan</button>
                    <button class="btn-create" onclick="buatPenawaran(this)">Buat</button>
                    <button class="btn-delete" onclick="hapusBaris(this)">Hapus</button>
                </div>
            </td>
        `;
        tbody.appendChild(row);
    }

    window.simpanPenawaran = async function(button){
        const row = button.closest('tr');
        const data = {
            tanggal: row.querySelector('.tanggal').value,
            nomor: row.querySelector('.nopenawaran').value,
            perusahaan: row.querySelector('.perusahaan').value,
            pekerjaan: row.querySelector('.pekerjaan').value,
            nilai: row.querySelector('.nilai').value,
            keterangan: row.querySelector('.keterangan').value
        };
        await addDoc(collection(db,'penawaran'),data);
        alert('Penawaran berhasil disimpan');
        loadPenawaran();
    }

    window.buatPenawaran = async function(button){
        const row = button.closest('tr');
        const getValue = (cls, idx) => row.querySelector(cls)? row.querySelector(cls).value : row.children[idx].innerText;
        
        try {
            const worksheet = await loadExcelFile('penawaran-harga.xlsx');
            
            // PENAWARAN: D7=tanggal, D10=perusahaan, J7=nopenawaran
            worksheet.getCell('D7').value = getValue('.tanggal', 0);
            worksheet.getCell('D10').value = getValue('.perusahaan', 2);
            worksheet.getCell('J7').value = getValue('.nopenawaran', 1);

            const buffer = await worksheet.workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${getValue('.nopenawaran', 1) || 'penawaran'}.xlsx`;
            link.click();
            URL.revokeObjectURL(link.href);
        } catch (error) {
            console.error('ERROR PENAWARAN:', error);
            alert(`Gagal: ${error.message}`);
        }
    }

    async function loadPenawaran(){
        const tbody = document.getElementById('penawaranBody');
        tbody.innerHTML='';
        const querySnapshot = await getDocs(collection(db,'penawaran'));
        querySnapshot.forEach((docSnap)=>{
            const data = docSnap.data();
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${data.tanggal}</td>
                <td>${data.nomor}</td>
                <td>${data.perusahaan}</td>
                <td>${data.pekerjaan}</td>
                <td>${data.nilai}</td>
                <td>${data.keterangan}</td>
                <td>
                    <div class="aksi-wrap">
                        <button class="btn-create" onclick="buatPenawaran(this)">Buat</button>
                        <button class="btn-delete" onclick="hapusPenawaranFirebase('${docSnap.id}')">Hapus</button>
                    </div>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    window.hapusPenawaranFirebase = async function(id){
        if(confirm('Hapus data penawaran ini?')){
            await deleteDoc(doc(db,'penawaran',id));
            loadPenawaran();
        }
    }

    loadInvoice();
    loadPenawaran();

</script>

</body>
</html>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG FIREBASE */
const firebaseConfig = {

apiKey: "AIzaSyADV-EDV5k_C9wyxWX5mFFj4BVqOt5nmgs",

authDomain: "khanza-dashboard.firebaseapp.com",

projectId: "khanza-dashboard",

storageBucket: "khanza-dashboard.firebasestorage.app",

messagingSenderId: "1078817547940",

appId: "1:1078817547940:web:218d66f38846596e862831",

measurementId: "G-YH3MGMZGY4"

};

/* INISIALISASI */
const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* GLOBAL */
window.db = db;
window.collection = collection;
window.addDoc = addDoc;
window.getDocs = getDocs;
window.deleteDoc = deleteDoc;
window.doc = doc;

/* LOAD DATA SAAT HALAMAN DIBUKA */
window.addEventListener('DOMContentLoaded', async () => {

const querySnapshot = await getDocs(
collection(db, "invoice")
);

querySnapshot.forEach((docData) => {

const data = docData.data();

tambahRowDariFirebase(
docData.id,
data.tanggal,
data.invoice,
data.perusahaan,
data.pekerjaan,
data.nilai,
data.keterangan
);

});

});

/* AUTO NOMOR */
let nomor = 1;

/* TAMBAH ROW */
window.tambahRow = function(){

const tbody = document.querySelector('#invoiceTable tbody');

const row = document.createElement('tr');

row.innerHTML = `

<td>${nomor}</td>

<td>
<input type="date" class="tanggal">
</td>

<td>
<input type="text" class="invoice" placeholder="INV-001">
</td>

<td>
<input type="text" class="perusahaan" placeholder="Nama Perusahaan">
</td>

<td>
<input type="text" class="pekerjaan" placeholder="Nama Pekerjaan">
</td>

<td>
<input type="text" class="nilai" placeholder="Rp. 0">
</td>

<td>
<input type="text" class="keterangan" placeholder="Keterangan">
</td>

<td>

<div style="display:flex;gap:10px;">

<button class="btn btn-delete" onclick="hapusRow(this)">
Hapus
</button>

<button class="btn btn-create" onclick="simpanInvoice(this)">
Simpan
</button>

<button class="btn btn-create" onclick="buatInvoice(this)">
Excel
</button>

</div>

</td>

`;

tbody.appendChild(row);

nomor++;

}

/* TAMBAH DATA DARI FIREBASE */
function tambahRowDariFirebase(
id,
tanggal,
invoice,
perusahaan,
pekerjaan,
nilai,
keterangan
){

const tbody = document.querySelector('#invoiceTable tbody');

const row = document.createElement('tr');

row.setAttribute('data-id', id);

row.innerHTML = `

<td>${nomor}</td>

<td>
<input type="date" class="tanggal" value="${tanggal}">
</td>

<td>
<input type="text" class="invoice" value="${invoice}">
</td>

<td>
<input type="text" class="perusahaan" value="${perusahaan}">
</td>

<td>
<input type="text" class="pekerjaan" value="${pekerjaan}">
</td>

<td>
<input type="text" class="nilai" value="${nilai}">
</td>

<td>
<input type="text" class="keterangan" value="${keterangan}">
</td>

<td>

<div style="display:flex;gap:10px;">

<button class="btn btn-delete" onclick="hapusRow(this)">
Hapus
</button>

<button class="btn btn-create" onclick="buatInvoice(this)">
Excel
</button>

</div>

</td>

`;

tbody.appendChild(row);

nomor++;

}

/* SIMPAN KE FIREBASE */
window.simpanInvoice = async function(button){

const row = button.closest('tr');

const tanggal = row.querySelector('.tanggal').value;
const invoice = row.querySelector('.invoice').value;
const perusahaan = row.querySelector('.perusahaan').value;
const pekerjaan = row.querySelector('.pekerjaan').value;
const nilai = row.querySelector('.nilai').value;
const keterangan = row.querySelector('.keterangan').value;

if(
tanggal === '' ||
invoice === '' ||
perusahaan === ''
){

alert('Lengkapi data invoice');

return;

}

try{

const docRef = await addDoc(
collection(db, "invoice"),
{
tanggal,
invoice,
perusahaan,
pekerjaan,
nilai,
keterangan
}
);

row.setAttribute('data-id', docRef.id);

alert('Invoice berhasil disimpan ke Firebase');

}catch(error){

console.log(error);

alert('Gagal menyimpan');

}

}

/* HAPUS */
window.hapusRow = async function(button){

const row = button.closest('tr');

const id = row.getAttribute('data-id');

if(id){

await deleteDoc(doc(db, "invoice", id));

}

row.remove();

}

/* DOWNLOAD EXCEL */
window.buatInvoice = async function(button){

const row = button.closest('tr');

const tanggal = row.querySelector('.tanggal').value;
const invoice = row.querySelector('.invoice').value;
const perusahaan = row.querySelector('.perusahaan').value;
const pekerjaan = row.querySelector('.pekerjaan').value;
const nilai = row.querySelector('.nilai').value;
const keterangan = row.querySelector('.keterangan').value;

try{

const response = await fetch('invoice.xlsx');

const buffer = await response.arrayBuffer();

const workbook = new ExcelJS.Workbook();

await workbook.xlsx.load(buffer);

const worksheet = workbook.worksheets[0];

/* ISI EXCEL */
worksheet.getCell('D17').value = perusahaan;
worksheet.getCell('J14').value = tanggal;
worksheet.getCell('J15').value = invoice;
worksheet.getCell('D20').value = pekerjaan;
worksheet.getCell('J20').value = nilai;
worksheet.getCell('D22').value = keterangan;

const newBuffer = await workbook.xlsx.writeBuffer();

saveAs(

new Blob(
[newBuffer],
{
type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
}
),

`Invoice-${invoice}.xlsx`

);

}catch(error){

console.log(error);

alert('invoice.xlsx tidak ditemukan');

}

}

</script>
